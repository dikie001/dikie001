<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink       { 0%,100%{opacity:1}50%{opacity:0} }
      @keyframes pulse       { 0%,100%{opacity:.3;r:4}50%{opacity:1;r:6.5} }
      @keyframes edgeFlow    { 0%,100%{opacity:.08}50%{opacity:.55} }
      @keyframes floatUp     { 0%,100%{transform:translateY(0);opacity:.13}50%{transform:translateY(-14px);opacity:.28} }
      @keyframes reveal      { from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)} }
      @keyframes scanline    { 0%{transform:translateY(0)}100%{transform:translateY(230px)} }
      @keyframes glitch      { 0%,92%,100%{transform:translateX(0);opacity:1}93%{transform:translateX(-3px);opacity:.7}96%{transform:translateX(3px);opacity:.8} }
      @keyframes gridPulse   { 0%,100%{opacity:.04}50%{opacity:.10} }
      @keyframes dash        { to{stroke-dashoffset:-24} }
      @keyframes orbitDot    { 0%{transform:rotate(0deg)   translateX(28px)}100%{transform:rotate(360deg) translateX(28px)} }
      @keyframes orbitDot2   { 0%{transform:rotate(120deg) translateX(22px)}100%{transform:rotate(480deg) translateX(22px)} }
      @keyframes orbitDot3   { 0%{transform:rotate(240deg) translateX(18px)}100%{transform:rotate(600deg) translateX(18px)} }
      @keyframes fadeFlicker { 0%,100%{opacity:.7}45%{opacity:.4}50%{opacity:.9}55%{opacity:.5} }
      @keyframes matrixDrop  { 0%{transform:translateY(-20px);opacity:0}10%{opacity:.25}90%{opacity:.2}100%{transform:translateY(280px);opacity:0} }

      .mono { font-family:'JetBrains Mono','Fira Code','Courier New',monospace; }
      .kw   { fill:#c084fc; }
      .fn   { fill:#60a5fa; }
      .str  { fill:#f59e0b; }
      .num  { fill:#f87171; }
      .cmt  { fill:#475569; }
      .op   { fill:#94a3b8; }
      .var  { fill:#e2e8f0; }
      .ok   { fill:#10b981; }
      .pmt  { fill:#0ea5e9; }

      .line1  { animation:reveal .4s ease forwards .4s;  opacity:0; }
      .line2  { animation:reveal .4s ease forwards 1.2s; opacity:0; }
      .line3  { animation:reveal .4s ease forwards 2.0s; opacity:0; }
      .line4  { animation:reveal .4s ease forwards 2.8s; opacity:0; }
      .line5  { animation:reveal .4s ease forwards 3.6s; opacity:0; }
      .line6  { animation:reveal .4s ease forwards 4.4s; opacity:0; }
      .line7  { animation:reveal .4s ease forwards 5.2s; opacity:0; }
      .line8  { animation:reveal .4s ease forwards 6.0s; opacity:0; }
      .line9  { animation:reveal .4s ease forwards 6.8s; opacity:0; }
      .cursor { animation:blink 1s step-end infinite 7s; opacity:0; }
    </style>

    <linearGradient id="bg"  x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#060910"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#0ea5e9" stop-opacity=".8"/>
      <stop offset="60%"  stop-color="#c084fc" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6366f1" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tc">
      <rect x="28" y="60" width="490" height="244"/>
    </clipPath>
    <clipPath id="matrixClip">
      <rect x="545" y="0" width="360" height="320"/>
    </clipPath>
  </defs>

  <!-- BG -->
  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Dot grid background -->
  <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r=".8" fill="#1e293b" opacity=".5"/>
  </pattern>
  <rect width="900" height="320" fill="url(#dots)" style="animation:gridPulse 4s ease-in-out infinite"/>

  <!-- Top / bottom accent bars -->
  <rect x="0" y="0"   width="900" height="2" fill="url(#topBar)"/>
  <rect x="0" y="318" width="900" height="2" fill="url(#botBar)"/>

  <!-- Vertical side accent -->
  <rect x="0" y="0" width="1" height="320" fill="#0ea5e9" opacity=".3"/>
  <rect x="899" y="0" width="1" height="320" fill="#6366f1" opacity=".3"/>

  <!-- ── MATRIX RAIN (right background) ── -->
  <g clip-path="url(#matrixClip)" opacity=".18">
    <!-- col 1 -->
    <text class="mono" font-size="10" fill="#0ea5e9" x="555" y="0" style="animation:matrixDrop 4.2s linear infinite 0s">ƒ</text>
    <text class="mono" font-size="10" fill="#0ea5e9" x="555" y="14" style="animation:matrixDrop 4.2s linear infinite .3s">∑</text>
    <text class="mono" font-size="10" fill="#0ea5e9" x="555" y="28" style="animation:matrixDrop 4.2s linear infinite .6s">λ</text>
    <!-- col 2 -->
    <text class="mono" font-size="10" fill="#c084fc" x="575" y="0" style="animation:matrixDrop 5s linear infinite .8s">0</text>
    <text class="mono" font-size="10" fill="#c084fc" x="575" y="14" style="animation:matrixDrop 5s linear infinite 1.1s">1</text>
    <text class="mono" font-size="10" fill="#c084fc" x="575" y="28" style="animation:matrixDrop 5s linear infinite 1.4s">φ</text>
    <!-- col 3 -->
    <text class="mono" font-size="10" fill="#0ea5e9" x="595" y="0" style="animation:matrixDrop 3.8s linear infinite 1.5s">{</text>
    <text class="mono" font-size="10" fill="#0ea5e9" x="595" y="14" style="animation:matrixDrop 3.8s linear infinite 1.8s">}</text>
    <text class="mono" font-size="10" fill="#0ea5e9" x="595" y="28" style="animation:matrixDrop 3.8s linear infinite 2.1s">∞</text>
    <!-- col 4 -->
    <text class="mono" font-size="10" fill="#c084fc" x="615" y="0" style="animation:matrixDrop 4.5s linear infinite 2.3s">⟨</text>
    <text class="mono" font-size="10" fill="#c084fc" x="615" y="14" style="animation:matrixDrop 4.5s linear infinite 2.6s">⟩</text>
    <text class="mono" font-size="10" fill="#c084fc" x="615" y="28" style="animation:matrixDrop 4.5s linear infinite 2.9s">π</text>
  </g>

  <!-- ── NEURAL NETWORK ── -->
  <!-- Animated dashed edges -->
  <g stroke-dasharray="6 4" style="animation:dash 1s linear infinite">
    <line x1="648" y1="88"  x2="730" y2="118" stroke="#6366f1" stroke-width="1.2" opacity=".35"/>
    <line x1="648" y1="88"  x2="730" y2="178" stroke="#6366f1" stroke-width="1.2" opacity=".2"/>
    <line x1="648" y1="160" x2="730" y2="118" stroke="#0ea5e9" stroke-width="1.2" opacity=".35"/>
    <line x1="648" y1="160" x2="730" y2="178" stroke="#0ea5e9" stroke-width="1.2" opacity=".35"/>
    <line x1="648" y1="232" x2="730" y2="178" stroke="#6366f1" stroke-width="1.2" opacity=".2"/>
    <line x1="648" y1="232" x2="730" y2="118" stroke="#6366f1" stroke-width="1.2" opacity=".15"/>
  </g>
  <g stroke-dasharray="6 4" style="animation:dash 1.4s linear infinite reverse">
    <line x1="730" y1="118" x2="808" y2="100" stroke="#c084fc" stroke-width="1.2" opacity=".3"/>
    <line x1="730" y1="118" x2="808" y2="160" stroke="#c084fc" stroke-width="1.2" opacity=".3"/>
    <line x1="730" y1="178" x2="808" y2="160" stroke="#0ea5e9" stroke-width="1.2" opacity=".3"/>
    <line x1="730" y1="178" x2="808" y2="220" stroke="#0ea5e9" stroke-width="1.2" opacity=".3"/>
  </g>
  <g stroke-dasharray="6 4" style="animation:dash 1s linear infinite">
    <line x1="808" y1="100" x2="876" y2="160" stroke="#10b981" stroke-width="1.5" opacity=".4"/>
    <line x1="808" y1="160" x2="876" y2="160" stroke="#10b981" stroke-width="1.5" opacity=".4"/>
    <line x1="808" y1="220" x2="876" y2="160" stroke="#10b981" stroke-width="1.5" opacity=".4"/>
  </g>

  <!-- Input nodes -->
  <circle cx="648" cy="88"  r="5" fill="#0ea5e9" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite 0s"/>
  <circle cx="648" cy="160" r="5" fill="#0ea5e9" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite .6s"/>
  <circle cx="648" cy="232" r="5" fill="#0ea5e9" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite 1.2s"/>
  <!-- Hidden nodes -->
  <circle cx="730" cy="118" r="5" fill="#c084fc" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite .4s"/>
  <circle cx="730" cy="178" r="5" fill="#c084fc" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite 1s"/>
  <!-- Hidden 2 nodes -->
  <circle cx="808" cy="100" r="5" fill="#6366f1" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite .2s"/>
  <circle cx="808" cy="160" r="5" fill="#6366f1" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite .8s"/>
  <circle cx="808" cy="220" r="5" fill="#6366f1" filter="url(#glow)" style="animation:pulse 2.5s ease-in-out infinite 1.4s"/>
  <!-- Output node (orbiting) -->
  <g transform="translate(876,160)">
    <circle r="8" fill="#10b981" filter="url(#strongGlow)" style="animation:pulse 1.5s ease-in-out infinite"/>
    <circle r="2.5" fill="#ffffff" opacity=".9" style="animation:orbitDot 2s linear infinite;transform-origin:0 0"/>
    <circle r="2"   fill="#0ea5e9" opacity=".8" style="animation:orbitDot2 3s linear infinite;transform-origin:0 0"/>
    <circle r="1.5" fill="#c084fc" opacity=".7" style="animation:orbitDot3 4s linear infinite;transform-origin:0 0"/>
  </g>

  <!-- Labels -->
  <text class="mono" font-size="7.5" fill="#475569" x="640" y="256" text-anchor="middle">input</text>
  <text class="mono" font-size="7.5" fill="#475569" x="730" y="204" text-anchor="middle">hidden</text>
  <text class="mono" font-size="7.5" fill="#475569" x="808" y="242" text-anchor="middle">hidden</text>
  <text class="mono" font-size="7.5" fill="#10b981" x="876" y="183" text-anchor="middle">output</text>

  <!-- Network title -->
  <text class="mono" font-size="9" fill="#6366f1" x="762" y="270" text-anchor="middle" opacity=".6" style="animation:fadeFlicker 5s ease-in-out infinite">[ neural_net.forward() ]</text>

  <!-- ── TERMINAL WINDOW ── -->
  <rect x="18" y="20" width="510" height="290" rx="10" fill="url(#termGrad)" stroke="#1e3a5f" stroke-width="1.2"/>
  <!-- Title bar -->
  <rect x="18" y="20" width="510" height="30" rx="10" fill="#0f1923"/>
  <rect x="18" y="36" width="510" height="14" fill="#0f1923"/>
  <!-- Traffic lights -->
  <circle cx="40"  cy="35" r="5.5" fill="#ff5f57"/>
  <circle cx="60"  cy="35" r="5.5" fill="#febc2e"/>
  <circle cx="80"  cy="35" r="5.5" fill="#28c840"/>
  <!-- Shell label -->
  <text class="mono" font-size="11" fill="#334155" x="270" y="40" text-anchor="middle">zsh — dickens@dev: ~/projects/ai-app</text>
  <!-- Glitch title -->
  <text class="mono" font-size="11" fill="#0ea5e9" x="270" y="40" text-anchor="middle" opacity=".5" style="animation:glitch 7s ease-in-out infinite">zsh — dickens@dev: ~/projects/ai-app</text>

  <!-- Content -->
  <g clip-path="url(#tc)" class="mono" font-size="12">

    <!-- scanline -->
    <rect x="18" y="60" width="510" height="2.5" fill="#0ea5e9" opacity=".04">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,244" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- 1: comment -->
    <g class="line1">
      <text x="36" y="88"  class="cmt">// initializing runtime environment...</text>
    </g>

    <!-- 2: import -->
    <g class="line2">
      <text x="36" y="108">
        <tspan class="kw">import </tspan>
        <tspan class="op">{ </tspan>
        <tspan class="fn">useState</tspan>
        <tspan class="op">, </tspan>
        <tspan class="fn">useEffect</tspan>
        <tspan class="op"> } </tspan>
        <tspan class="kw">from </tspan>
        <tspan class="str">'react'</tspan>
        <tspan class="op">;</tspan>
      </text>
    </g>

    <!-- 3: const arrow fn -->
    <g class="line3">
      <text x="36" y="128">
        <tspan class="kw">const </tspan>
        <tspan class="fn">fetchAI </tspan>
        <tspan class="op">= </tspan>
        <tspan class="kw">async</tspan>
        <tspan class="op">(</tspan>
        <tspan class="var">prompt</tspan>
        <tspan class="op">: </tspan>
        <tspan class="fn">string</tspan>
        <tspan class="op">) </tspan>
        <tspan class="kw">=&gt; </tspan>
        <tspan class="op">{</tspan>
      </text>
    </g>

    <!-- 4: await fetch -->
    <g class="line4">
      <text x="36" y="148">
        <tspan fill="#0f1923">____</tspan>
        <tspan class="kw">const </tspan>
        <tspan class="var">res </tspan>
        <tspan class="op">= </tspan>
        <tspan class="kw">await </tspan>
        <tspan class="fn">fetch</tspan>
        <tspan class="op">(</tspan>
        <tspan class="str">'/api/claude'</tspan>
        <tspan class="op">, { </tspan>
        <tspan class="var">body</tspan>
        <tspan class="op">: </tspan>
        <tspan class="fn">JSON</tspan>
        <tspan class="op">.</tspan>
        <tspan class="fn">stringify</tspan>
        <tspan class="op">({ </tspan>
        <tspan class="var">prompt </tspan>
        <tspan class="op">}) });</tspan>
      </text>
    </g>

    <!-- 5: return -->
    <g class="line5">
      <text x="36" y="168">
        <tspan fill="#0f1923">____</tspan>
        <tspan class="kw">return </tspan>
        <tspan class="var">res</tspan>
        <tspan class="op">.</tspan>
        <tspan class="fn">json</tspan>
        <tspan class="op">&lt;</tspan>
        <tspan class="fn">AIResponse</tspan>
        <tspan class="op">&gt;();</tspan>
      </text>
    </g>

    <!-- 6: closing brace -->
    <g class="line6">
      <text x="36" y="188" class="op">};</text>
    </g>

    <!-- 7: prompt + run -->
    <g class="line7">
      <text x="36" y="216">
        <tspan class="pmt">❯ </tspan>
        <tspan class="var">node </tspan>
        <tspan class="str">--loader</tspan>
        <tspan class="var"> ts-node/esm </tspan>
        <tspan class="fn">index.ts</tspan>
      </text>
    </g>

    <!-- 8: output success -->
    <g class="line8">
      <text x="36" y="240">
        <tspan class="ok">✔ </tspan>
        <tspan class="var">compiled in </tspan>
        <tspan class="num">312</tspan>
        <tspan class="var">ms  · status: </tspan>
        <tspan class="ok">200 OK</tspan>
        <tspan class="var">  · tokens: </tspan>
        <tspan class="num">4096</tspan>
      </text>
    </g>

    <!-- 9: AI response line -->
    <g class="line9">
      <text x="36" y="260">
        <tspan class="ok">◈ </tspan>
        <tspan class="cmt">AI_RESPONSE → </tspan>
        <tspan class="str">"Hello, Dickens. Ready to ship."</tspan>
      </text>
    </g>

    <!-- Active cursor -->
    <g class="line9">
      <text x="36" y="284" class="pmt">❯ </text>
      <rect class="cursor" x="54" y="271" width="7" height="13" fill="#0ea5e9" rx="1"/>
    </g>
  </g>

  <!-- Corner brackets (futuristic HUD feel) -->
  <g stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity=".4">
    <path d="M4,12 L4,4 L12,4"/>
    <path d="M888,4 L896,4 L896,12"/>
    <path d="M4,308 L4,316 L12,316"/>
    <path d="M888,316 L896,316 L896,308"/>
  </g>
</svg>
