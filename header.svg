<svg width="100%" height="100%" viewBox="0 0 900 340" style="max-width: 100%; height: auto;" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink     { 0%,100%{opacity:1}50%{opacity:0} }
      @keyframes pulse     { 0%,100%{opacity:.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)} }
      @keyframes dash      { to{stroke-dashoffset:-40} }
      @keyframes dashRev   { to{stroke-dashoffset:40} }
      @keyframes reveal    { from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)} }
      @keyframes glitch    { 0%,90%,100%{transform:translateX(0);opacity:1}92%{transform:translateX(-3px);opacity:.6}96%{transform:translateX(2px);opacity:.7} }
      @keyframes flicker   { 0%,100%{opacity:.65}40%{opacity:.35}55%{opacity:.9} }
      @keyframes progressW { from{width:0}to{width:210px} }
      @keyframes progressW2{ from{width:0}to{width:178px} }
      @keyframes progressW3{ from{width:0}to{width:195px} }
      @keyframes dotGrid   { 0%,100%{opacity:.04}50%{opacity:.09} }
      @keyframes borderGlow{ 0%,100%{opacity:.3}50%{opacity:.7} }

      .mono { font-family:'JetBrains Mono','Fira Code','Courier New',monospace; }
      .kw  { fill:#c084fc; }
      .fn  { fill:#60a5fa; }
      .str { fill:#f59e0b; }
      .num { fill:#f87171; }
      .cmt { fill:#3d5068; }
      .op  { fill:#64748b; }
      .var { fill:#e2e8f0; }
      .ok  { fill:#10b981; }
      .err { fill:#f87171; }
      .pmt { fill:#0ea5e9; }
      .dim { fill:#334155; }
      .warn{ fill:#f59e0b; }

      .l1  { animation:reveal .35s ease forwards .3s;  opacity:0 }
      .l2  { animation:reveal .35s ease forwards 1.1s; opacity:0 }
      .l3  { animation:reveal .35s ease forwards 1.5s; opacity:0 }
      .l4  { animation:reveal .35s ease forwards 2.0s; opacity:0 }
      .l5  { animation:reveal .35s ease forwards 2.5s; opacity:0 }
      .l6  { animation:reveal .35s ease forwards 3.0s; opacity:0 }
      .l7  { animation:reveal .35s ease forwards 3.6s; opacity:0 }
      .l8  { animation:reveal .35s ease forwards 4.2s; opacity:0 }
      .l9  { animation:reveal .35s ease forwards 4.8s; opacity:0 }
      .l10 { animation:reveal .35s ease forwards 5.4s; opacity:0 }
      .l11 { animation:reveal .35s ease forwards 6.0s; opacity:0 }
      .l12 { animation:reveal .35s ease forwards 6.6s; opacity:0 }
      .cur { animation:blink 1s step-end infinite 7.2s; opacity:0 }

      .pb1 { animation:progressW  1.2s cubic-bezier(.4,0,.2,1) forwards 1.8s; width:0 }
      .pb2 { animation:progressW2 1s  cubic-bezier(.4,0,.2,1) forwards 2.8s; width:0 }
      .pb3 { animation:progressW3 1.1s cubic-bezier(.4,0,.2,1) forwards 3.4s; width:0 }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#05080f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="tBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#0ea5e9" stop-opacity=".9"/>
      <stop offset="65%"  stop-color="#c084fc" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6366f1" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a1220"/>
      <stop offset="100%" stop-color="#060d18"/>
    </linearGradient>
    <linearGradient id="pbGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="pbGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="pbGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tc">
      <rect x="20" y="62" width="510" height="264"/>
    </clipPath>
    <clipPath id="mc">
      <rect x="540" y="0" width="360" height="340"/>
    </clipPath>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r=".7" fill="#1e293b" opacity=".5"/>
    </pattern>

    <path id="pTL" d="M 635,70 L 695,70 L 755,130 L 755,170" />
    <path id="pTR" d="M 755,170 L 755,130 L 815,70 L 865,70" />
    <path id="pBL" d="M 755,170 L 755,210 L 695,270 L 635,270" />
    <path id="pBR" d="M 865,270 L 815,270 L 755,210 L 755,170" />
    <path id="pML" d="M 565,170 L 755,170" />
  </defs>

  <rect width="900" height="340" fill="url(#bg)"/>
  <rect width="900" height="340" fill="url(#dots)" style="animation:dotGrid 5s ease-in-out infinite"/>

  <rect x="0" y="0"   width="900" height="2" fill="url(#tBar)"/>
  <rect x="0" y="338" width="900" height="2" fill="url(#bBar)"/>
  <rect x="0"   y="0" width="1" height="340" fill="#0ea5e9" opacity=".25" style="animation:borderGlow 3s ease-in-out infinite"/>
  <rect x="899" y="0" width="1" height="340" fill="#c084fc" opacity=".25" style="animation:borderGlow 3s ease-in-out infinite 1.5s"/>

  <g stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity=".5">
    <path d="M4,14 L4,4 L14,4"/>
    <path d="M886,4 L896,4 L896,14"/>
    <path d="M4,326 L4,336 L14,336"/>
    <path d="M886,336 L896,336 L896,326"/>
  </g>

  <g clip-path="url(#mc)">
    
    <g opacity="0.1" stroke="#0ea5e9" stroke-width="0.5" fill="none">
      <circle cx="755" cy="170" r="110"/>
      <circle cx="755" cy="170" r="75"/>
      <circle cx="755" cy="170" r="40"/>
      <line x1="625" y1="170" x2="885" y2="170"/>
      <line x1="755" y1="40" x2="755" y2="300"/>
    </g>

    <use href="#pTL" fill="none" stroke="#1e293b" stroke-width="2"/>
    <use href="#pTR" fill="none" stroke="#1e293b" stroke-width="2"/>
    <use href="#pBL" fill="none" stroke="#1e293b" stroke-width="2"/>
    <use href="#pBR" fill="none" stroke="#1e293b" stroke-width="2"/>
    <use href="#pML" fill="none" stroke="#1e293b" stroke-width="2"/>

    <use href="#pTL" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6 20" style="animation: dash 1s linear infinite"/>
    <use href="#pTR" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="6 20" style="animation: dash 1.2s linear infinite"/>
    <use href="#pBL" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6 20" style="animation: dash 1.5s linear infinite"/>
    <use href="#pBR" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 20" style="animation: dashRev 1.1s linear infinite"/>
    <use href="#pML" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 15" style="animation: dash 0.8s linear infinite"/>

    <circle r="3" fill="#fff" filter="url(#glow)">
      <animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#pTL"/></animateMotion>
    </circle>
    <circle r="3" fill="#fff" filter="url(#glow)">
      <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.4s"><mpath href="#pTR"/></animateMotion>
    </circle>
    <circle r="3" fill="#fff" filter="url(#glow)">
      <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.8s"><mpath href="#pBL"/></animateMotion>
    </circle>
    <circle r="3" fill="#fff" filter="url(#glow)">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.2s"><mpath href="#pBR"/></animateMotion>
    </circle>
    <circle r="3" fill="#fff" filter="url(#glow)">
      <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.5s"><mpath href="#pML"/></animateMotion>
    </circle>

    <text x="665" y="125" fill="#3d5068" font-size="7" class="mono">gRPC</text>
    <text x="830" y="125" fill="#3d5068" font-size="7" class="mono">TCP</text>
    <text x="665" y="225" fill="#3d5068" font-size="7" class="mono">pool</text>
    <text x="830" y="225" fill="#3d5068" font-size="7" class="mono">AMQP</text>

    <g opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0 755 170" to="360 755 170" dur="12s" repeatCount="indefinite"/>
      <circle cx="755" cy="170" r="45" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="10 20 40 10"/>
    </g>
    <g opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="360 755 170" to="0 755 170" dur="18s" repeatCount="indefinite"/>
      <circle cx="755" cy="170" r="60" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 6"/>
      <circle cx="755" cy="170" r="60" fill="none" stroke="#c084fc" stroke-width="2" stroke-dasharray="20 180" stroke-dashoffset="50"/>
    </g>
    
    <polygon points="755,140 781,155 781,185 755,200 729,185 729,155" fill="#0f172a" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="755" cy="170" r="6" fill="#0ea5e9" filter="url(#glow)" style="transform-origin:755px 170px; animation: pulse 2s ease-in-out infinite"/>
    <text x="755" y="218" text-anchor="middle" font-size="9" fill="#e2e8f0" class="mono">API_GATEWAY</text>

    <circle cx="635" cy="70" r="16" fill="#0f172a" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="635" cy="70" r="4" fill="#0ea5e9" opacity="0.8"/>
    <text x="635" y="45" text-anchor="middle" font-size="8" fill="#94a3b8" class="mono">CDN / EDGE</text>

    <circle cx="875" cy="70" r="16" fill="#0f172a" stroke="#c084fc" stroke-width="2"/>
    <circle cx="875" cy="70" r="6" fill="none" stroke="#c084fc" stroke-width="2" style="transform-origin:875px 70px; animation: pulse 1.5s infinite"/>
    <text x="875" y="45" text-anchor="middle" font-size="8" fill="#94a3b8" class="mono">REDIS CACHE</text>

    <circle cx="635" cy="270" r="16" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <line x1="627" y1="265" x2="643" y2="265" stroke="#10b981" stroke-width="1.5"/>
    <line x1="627" y1="270" x2="643" y2="270" stroke="#10b981" stroke-width="1.5"/>
    <line x1="627" y1="275" x2="643" y2="275" stroke="#10b981" stroke-width="1.5"/>
    <text x="635" y="302" text-anchor="middle" font-size="8" fill="#94a3b8" class="mono">POSTGRES DB</text>

    <circle cx="875" cy="270" r="16" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="875" cy="270" r="4" fill="#f59e0b" opacity="0.8"/>
    <text x="875" y="302" text-anchor="middle" font-size="8" fill="#94a3b8" class="mono">TASK WORKER</text>

    <circle cx="565" cy="170" r="12" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
    <circle cx="565" cy="170" r="3" fill="#6366f1"/>
    <text x="565" y="148" text-anchor="middle" font-size="8" fill="#94a3b8" class="mono">CLIENT</text>

  </g>

  <rect x="16" y="18" width="522" height="308" rx="10" fill="url(#tGrad)" stroke="#1a2d47" stroke-width="1.3"/>
  <rect x="16" y="18" width="522" height="32" rx="10" fill="#0c1624"/>
  <rect x="16" y="36" width="522" height="14" fill="#0c1624"/>
  <circle cx="38" cy="34" r="5.5" fill="#ff5f57"/>
  <circle cx="58" cy="34" r="5.5" fill="#febc2e"/>
  <circle cx="78" cy="34" r="5.5" fill="#28c840"/>
  <text class="mono" font-size="10.5" fill="#1e3a5f" x="278" y="39" text-anchor="middle">dickens@arch ~/projects/portfolio  [node v22 · pnpm]</text>
  <text class="mono" font-size="10.5" fill="#0ea5e9" x="278" y="39" text-anchor="middle" opacity=".4" style="animation:glitch 8s ease-in-out infinite">dickens@arch ~/projects/portfolio  [node v22 · pnpm]</text>

  <g clip-path="url(#tc)" class="mono" font-size="11.5">

    <rect x="16" y="62" width="522" height="2" fill="#0ea5e9" opacity=".035">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,264" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <g class="l1">
      <text x="34" y="86"><tspan class="pmt">❯ </tspan><tspan class="fn">git</tspan><tspan class="var"> log --oneline --graph -5</tspan></text>
    </g>
    <g class="l2">
      <text x="34" y="104"><tspan class="ok">* </tspan><tspan class="num">a3f9c12 </tspan><tspan class="var">feat: add </tspan><tspan class="str">WebSocket</tspan><tspan class="var"> real-time sync</tspan></text>
    </g>
    <g class="l3">
      <text x="34" y="120"><tspan class="dim">* </tspan><tspan class="num">d71e4ab </tspan><tspan class="var">refactor: </tspan><tspan class="fn">prisma</tspan><tspan class="var"> schema → </tspan><tspan class="str">CQRS</tspan><tspan class="var"> pattern</tspan></text>
    </g>

    <g class="l4">
      <text x="34" y="142"><tspan class="pmt">❯ </tspan><tspan class="fn">pnpm</tspan><tspan class="var"> tsc --noEmit --strict</tspan></text>
    </g>

    <g class="l4">
      <text x="34" y="160"><tspan class="cmt">  checking </tspan><tspan class="str">src/</tspan></text>
      <rect x="130" y="150" width="220" height="7" rx="3" fill="#1e293b"/>
      <rect x="130" y="150" height="7" rx="3" fill="url(#pbGrad)" class="pb1"/>
    </g>
    <g class="l5">
      <text x="34" y="176"><tspan class="cmt">  bundling </tspan><tspan class="str">lib/</tspan></text>
      <rect x="130" y="166" width="220" height="7" rx="3" fill="#1e293b"/>
      <rect x="130" y="166" height="7" rx="3" fill="url(#pbGrad2)" class="pb2"/>
    </g>
    <g class="l6">
      <text x="34" y="192"><tspan class="ok">✔ </tspan><tspan class="var">0 errors · 0 warnings · </tspan><tspan class="num">312ms</tspan></text>
    </g>

    <g class="l7">
      <text x="34" y="214"><tspan class="pmt">❯ </tspan><tspan class="fn">prisma</tspan><tspan class="var"> migrate deploy --schema </tspan><tspan class="str">./prisma/schema.prisma</tspan></text>
    </g>
    <g class="l8">
      <text x="34" y="230">
        <tspan class="ok">✔ </tspan><tspan class="var">Applied </tspan><tspan class="num">3</tspan><tspan class="var"> migrations  ·  </tspan>
        <tspan class="fn">PostgreSQL</tspan><tspan class="var"> 16  ·  </tspan><tspan class="ok">connection pool: 20</tspan>
      </text>
    </g>

    <g class="l9">
      <text x="34" y="250"><tspan class="pmt">❯ </tspan><tspan class="fn">docker</tspan><tspan class="var"> build -t </tspan><tspan class="str">dikie/portfolio:v2.4.0</tspan><tspan class="var"> --platform linux/amd64 .</tspan></text>
    </g>
    <g class="l10">
      <text x="34" y="266"><tspan class="cmt">  layer cache  </tspan></text>
      <rect x="130" y="256" width="220" height="7" rx="3" fill="#1e293b"/>
      <rect x="130" y="256" height="7" rx="3" fill="url(#pbGrad3)" class="pb3"/>
    </g>
    <g class="l11">
      <text x="34" y="284">
        <tspan class="ok">✔ </tspan><tspan class="var">image size: </tspan><tspan class="num">148MB</tspan>
        <tspan class="var">  ·  layers: </tspan><tspan class="num">12</tspan>
        <tspan class="var">  ·  </tspan><tspan class="ok">pushed → registry</tspan>
      </text>
    </g>

    <g class="l12">
      <text x="34" y="306">
        <tspan class="ok">🚀 </tspan><tspan class="var">deployed  ·  </tspan>
        <tspan class="fn">edge runtime</tspan><tspan class="var">  ·  latency: </tspan>
        <tspan class="ok">p99 &lt; 38ms</tspan>
      </text>
    </g>

    <g class="l12">
      <text x="34" y="326" class="pmt">❯ </text>
      <rect class="cur" x="54" y="313" width="7" height="13" fill="#0ea5e9" rx="1"/>
    </g>
  </g>
</svg>
